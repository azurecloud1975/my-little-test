<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizForge - 測驗與錯題神器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <style>
        :root {
            --primary: #D4FF33; 
            --primary-hover: #BBE022;
            --bg: #111111;
            --card-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #9CA3AF;
            --border: #333333;
            --success-bg: rgba(74, 222, 128, 0.1);
            --success-border: #4ADE80;
            --danger-bg: rgba(248, 113, 113, 0.1);
            --danger-border: #F87171;
            --radius: 8px;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background-color: var(--bg); color: var(--text-main); 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg); padding: 15px 20px;
            border-bottom: 1px solid var(--border); display: flex;
            justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        
        button {
            background-color: var(--primary); color: #111; border: none; font-weight: bold;
            padding: 10px 20px; border-radius: var(--radius); cursor: pointer;
            font-size: 1rem; transition: background 0.2s;
        }
        button:hover { background-color: var(--primary-hover); }
        button.outline {
            background-color: transparent; color: var(--text-main);
            border: 1px solid var(--border); font-weight: normal;
        }
        button.outline:hover { background-color: #333; }

        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; flex: 1; width: 100%; }
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card {
            background: var(--card-bg); padding: 25px; border-radius: var(--radius);
            border: 1px solid var(--border); margin-bottom: 20px;
        }

        .drop-zone {
            border: 2px dashed var(--border); border-radius: var(--radius);
            padding: 40px; text-align: center; color: var(--text-muted);
            cursor: pointer; transition: border-color 0.2s; background: #161616;
        }
        .drop-zone.dragover { border-color: var(--primary); }
        textarea {
            width: 100%; height: 150px; padding: 15px; border: 1px solid var(--border);
            border-radius: var(--radius); resize: vertical; margin-top: 15px; font-size: 1rem;
            background: #161616; color: var(--text-main);
        }

        .settings-group label { margin-right: 15px; cursor: pointer; }
        .q-count-selector { margin-top: 15px; display: flex; align-items: center; flex-wrap: wrap; gap: 10px;}
        
        .q-count-selector input[type="text"] { 
            width: 230px; padding: 6px; border: 1px solid var(--border); 
            border-radius: 4px; background: #161616; color: white; font-size: 0.9rem;
        }
        .q-count-selector input[type="text"]::placeholder { color: #777; }
        .q-count-selector input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .quiz-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px;}
        
        .option-label {
            display: block; padding: 15px; margin-bottom: 10px; border: 1px solid var(--border);
            border-radius: var(--radius); cursor: pointer; transition: all 0.2s; background: #1A1A1A;
        }
        .option-label:hover { background: #2A2A2A; }
        .option-label.selected { border-color: var(--primary); background: rgba(212, 255, 51, 0.05); }
        .option-label.correct-ans { border-color: var(--success-border); background: var(--success-bg); }
        .option-label.wrong-ans { border-color: var(--danger-border); background: var(--danger-bg); }
        
        .option-label b { color: var(--primary); margin-right: 5px; }
        .option-label.correct-ans b { color: var(--success-border); }
        .option-label.wrong-ans b { color: var(--danger-border); }

        .quiz-footer { display: flex; justify-content: space-between; margin-top: 20px; }
        .hint { text-align: right; color: var(--text-muted); font-size: 0.8rem; margin-top: 15px; }

        .result-summary { text-align: center; }
        .score-circle { font-size: 3rem; font-weight: bold; color: var(--primary); margin: 20px 0; }
        .stats-cards { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .stat-card { padding: 20px; border-radius: var(--radius); min-width: 120px; text-align: center; border: 1px solid var(--border); }
        .stat-card h3 { margin: 0; font-size: 2rem; }
        
        .action-buttons { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .details-section { margin-top: 40px; text-align: left;}
        .detail-item { padding: 15px; border-left: 4px solid var(--border); background: var(--card-bg); margin-bottom: 10px; }
        
        .flashcard-container { perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
        .flashcard-inner {
            transition: transform 0.6s; transform-style: preserve-3d;
            width: 100%; min-height: 300px; display: grid;
        }
        .flashcard-inner.flipped { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back {
            grid-area: 1 / 1; backface-visibility: hidden; position: relative;
            width: 100%; display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
            padding: 50px 30px 30px 30px;
            background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border);
            text-align: left; font-size: 1.1rem; box-sizing: border-box;
        }
        .flashcard-back { transform: rotateY(180deg); background: #161616; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center;
            z-index: 1000; display: none;
        }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: var(--radius); text-align: center; max-width: 400px; border: 1px solid var(--border); }
        .modal-buttons { margin-top: 20px; display: flex; justify-content: space-around; }
    </style>
</head>

    <script>
        let parsedQuestions = [], currentTestQuestions = [], currentQuestionIndex = 0;
        let userAnswers = [], wrongQuestions = JSON.parse(localStorage.getItem('quizForgeWrongQuestions')) || [];
        let flashcardIndex = 0, isQuizActive = false;
        
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        updateWrongCountUI();
        setupEventListeners();

        function setupEventListeners() {
            const dropZone = document.getElementById('drop-zone');
            const fileInput = document.getElementById('file-input');
            dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
            dropZone.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

            document.querySelectorAll('input[name="q-count"]').forEach(r => {
                r.addEventListener('change', (e) => {
                    const customInput = document.getElementById('custom-q-count');
                    customInput.disabled = (e.target.value !== 'custom');
                    if(!customInput.disabled) customInput.focus();
                });
            });

            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
                if (isQuizActive && (e.key === 'Enter' || e.key === ' ')) {
                    e.preventDefault();
                    if (document.getElementById('submit-btn').style.display !== 'none') document.getElementById('submit-btn').click();
                    else if (document.getElementById('next-btn').style.display !== 'none') document.getElementById('next-btn').click();
                } else if (document.getElementById('flashcard-screen').classList.contains('active')) {
                    if (e.key === ' ') { e.preventDefault(); flipCard(); }
                    else if (e.key === 'ArrowRight') nextFlashcard();
                    else if (e.key === 'ArrowLeft') prevFlashcard();
                }
            });
        }

        async function handleFiles(files) {
            if (files.length === 0) return;
            const file = files[0], textarea = document.getElementById('source-text');
            if (file.type === 'text/plain') textarea.value = await file.text();
            else if (file.type === 'application/pdf') {
                textarea.value = "正在解析 PDF (可能需要數秒鐘)...";
                try {
                    const pdf = await pdfjsLib.getDocument({ data: await file.arrayBuffer() }).promise;
                    let fullText = '';
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        let lastY = -1;
                        let pageText = '';
                        for (let item of textContent.items) {
                            if (lastY !== -1 && Math.abs(item.transform[5] - lastY) > 5) {
                                pageText += '\n';
                            }
                            pageText += item.str;
                            lastY = item.transform[5];
                        }
                        fullText += pageText + '\n';
                    }
                    textarea.value = fullText;
                } catch(err) { textarea.value = "PDF 解析失敗：" + err.message; }
            } else alert('請上傳 .txt 或 .pdf 格式檔案');
        }

        function parseText(text) {
            const normalizedText = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/（/g, '(').replace(/）/g, ')');
            
            const lines = normalizedText.split('\n').map(l => l.trim()).filter(line => {
                if (!line) return false;
                if (/^Page \d+ of \d+/i.test(line)) return false;
                if (/^---\s*PAGE/i.test(line)) return false;
                if (/勞動部勞動力發展/i.test(line)) return false;
                if (/MINISTRY OF LABOR/i.test(line)) return false;
                if (/WORKFORCE DEVELOPMENT/i.test(line)) return false;
                return true;
            });

            const questions = [];
            let currentQ = null;
            
            const qRegexTW = /^(\d+)[\.、]\s*\(([1-4A-Da-d]+)\)\s*(.*)/;
            const qRegexCCNA = /^(?:QUESTION\s*\d+|第?\s*\d+\s*[題\.]|Q\d+[:\.]?)\s*(.*)/i;
            const optRegex = /^\(?([A-H])\)?[\.、]\s*(.*)/i; 
            const ansRegex = /(?:Correct\s*Answer|答案|解答|Ans(?:wer)?)[\s:：]*([A-Ha-h\s,]+)/i;

            const pushCurrentQuestion = () => {
                if (!currentQ) return;

                const combinedText = currentQ.question + (currentQ.options.length === 0 ? "" : " " + currentQ.options.map(o => o.text).join(" "));
                
                if (currentQ.options.length === 0 && (combinedText.includes('①') || combinedText.includes('(1)'))) {
                    let qText = combinedText.replace(/\(1\)/g, '①').replace(/\(2\)/g, '②').replace(/\(3\)/g, '③').replace(/\(4\)/g, '④');
                    
                    const opt1 = qText.indexOf('①');
                    const opt2 = qText.indexOf('②');
                    const opt3 = qText.indexOf('③');
                    const opt4 = qText.indexOf('④');
                    
                    if (opt1 !== -1) {
                        currentQ.question = qText.substring(0, opt1).trim();
                        const t1 = qText.substring(opt1 + 1, opt2 !== -1 ? opt2 : qText.length).trim();
                        const t2 = opt2 !== -1 ? qText.substring(opt2 + 1, opt3 !== -1 ? opt3 : qText.length).trim() : "";
                        const t3 = opt3 !== -1 ? qText.substring(opt3 + 1, opt4 !== -1 ? opt4 : qText.length).trim() : "";
                        const t4 = opt4 !== -1 ? qText.substring(opt4 + 1).trim() : "";
                        
                        if(t1) currentQ.options.push({ key: 'A', text: t1 });
                        if(t2) currentQ.options.push({ key: 'B', text: t2 });
                        if(t3) currentQ.options.push({ key: 'C', text: t3 });
                        if(t4) currentQ.options.push({ key: 'D', text: t4 });
                    }
                }

                if (currentQ.options.length > 0 && currentQ.answer.length > 0) {
                    currentQ.question = currentQ.question.replace(/-\s+/g, '-').replace(/([\u4e00-\u9fa5])\s+([\u4e00-\u9fa5])/g, '$1$2').trim();
                    currentQ.options.forEach(opt => {
                        opt.text = opt.text.replace(/-\s+/g, '-').replace(/([\u4e00-\u9fa5])\s+([\u4e00-\u9fa5])/g, '$1$2').replace(/。$/, '').trim();
                    });
                    questions.push(currentQ);
                }
            };

            for (let line of lines) {
                let twMatch = line.match(qRegexTW);
                if (twMatch) {
                    pushCurrentQuestion();
                    let ansStr = twMatch[2];
                    let mappedAns = [];
                    for(let char of ansStr) {
                        if(char === '1' || char === 'A' || char === 'a') mappedAns.push('A');
                        if(char === '2' || char === 'B' || char === 'b') mappedAns.push('B');
                        if(char === '3' || char === 'C' || char === 'c') mappedAns.push('C');
                        if(char === '4' || char === 'D' || char === 'd') mappedAns.push('D');
                    }
                    currentQ = { question: twMatch[3] || "", options: [], answer: mappedAns };
                    continue;
                }

                let qMatch = line.match(qRegexCCNA);
                if (qMatch) {
                    pushCurrentQuestion();
                    currentQ = { question: qMatch[1] || "", options: [], answer: [] };
                    continue;
                }

                if (!currentQ) continue; 

                let ansMatch = line.match(ansRegex);
                if (ansMatch) {
                    currentQ.answer = ansMatch[1].replace(/[^A-Ha-h]/gi, '').toUpperCase().split('');
                    let cleanLine = line.replace(ansRegex, '').trim();
                    if (cleanLine) {
                        let optMatch = cleanLine.match(optRegex);
                        if (optMatch) {
                             currentQ.options.push({ key: optMatch[1].toUpperCase(), text: optMatch[2] });
                        } else if (currentQ.options.length > 0) {
                             currentQ.options[currentQ.options.length-1].text += ' ' + cleanLine;
                        }
                    }
                    continue; 
                }

                let optMatch = line.match(optRegex);
                if (optMatch) {
                    currentQ.options.push({ key: optMatch[1].toUpperCase(), text: optMatch[2] });
                    continue;
                }
                
                if (currentQ.options.length === 0) {
                    currentQ.question += (currentQ.question ? ' ' : '') + line;
                } else if (currentQ.answer.length === 0) {
                    currentQ.options[currentQ.options.length-1].text += ' ' + line;
                }
            }
            
            pushCurrentQuestion();
            
            questions.forEach(q => q.options.forEach(opt => opt.isCorrect = q.answer.includes(opt.key)));
            return questions;
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startQuiz() {
            const text = document.getElementById('source-text').value;
            if(!text) { alert("請輸入題庫內容！"); return; }
            parsedQuestions = parseText(text);
            if (parsedQuestions.length === 0) { alert("無法解析出任何題目，請檢查格式。"); return; }

            let baseQuestions = JSON.parse(JSON.stringify(parsedQuestions));
            const countType = document.querySelector('input[name="q-count"]:checked').value;
            let selectedQuestions = [];

            if (countType === 'custom') {
                const customVal = document.getElementById('custom-q-count').value.trim();
                if (customVal.includes('-')) {
                    let parts = customVal.split('-');
                    let start = parseInt(parts[0]);
                    let end = parseInt(parts[1]);
                    if (isNaN(start) || isNaN(end) || start < 1 || end < start) {
                        alert("自訂範圍格式錯誤！請輸入如 3-50 的格式。");
                        return;
                    }
                    end = Math.min(end, baseQuestions.length); 
                    selectedQuestions = baseQuestions.slice(start - 1, end);
                    if (document.getElementById('shuffle-questions').checked) {
                        shuffleArray(selectedQuestions);
                    }
                } else {
                    let limit = parseInt(customVal);
                    if (isNaN(limit) || limit < 1) limit = baseQuestions.length;
                    if (document.getElementById('shuffle-questions').checked) shuffleArray(baseQuestions);
                    selectedQuestions = baseQuestions.slice(0, Math.min(limit, baseQuestions.length));
                }
            } else {
                let limit = countType === 'all' ? baseQuestions.length : parseInt(countType);
                if (document.getElementById('shuffle-questions').checked) shuffleArray(baseQuestions);
                selectedQuestions = baseQuestions.slice(0, Math.min(limit, baseQuestions.length));
            }

            currentTestQuestions = selectedQuestions;

            currentTestQuestions.forEach(q => {
                if (document.getElementById('shuffle-options').checked) shuffleArray(q.options);
                q.displayOptions = q.options.map((opt, index) => ({ ...opt, visualKey: String.fromCharCode(65 + index) }));
                q.displayAnswer = q.displayOptions.filter(o => o.isCorrect).map(o => o.visualKey);
            });

            userAnswers = new Array(currentTestQuestions.length).fill(null);
            currentQuestionIndex = 0; isQuizActive = true;
            switchScreen('quiz-screen'); renderQuestion();
        }

        function renderQuestion() {
            const q = currentTestQuestions[currentQuestionIndex];
            document.getElementById('quiz-progress').innerText = `題目 ${currentQuestionIndex + 1} / ${currentTestQuestions.length}`;
            document.getElementById('question-text').innerText = q.question;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.displayOptions.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'option-label';
                div.innerHTML = `<b>${opt.visualKey}.</b> ${opt.text}`;
                div.onclick = () => {
                    if (document.getElementById('submit-btn').style.display === 'none') return;
                    if (q.displayAnswer.length > 1) div.classList.toggle('selected');
                    else { document.querySelectorAll('.option-label').forEach(el => el.classList.remove('selected')); div.classList.add('selected'); }
                    updateSubmitBtnState();
                };
                div.dataset.visualKey = opt.visualKey;
                div.dataset.isCorrect = opt.isCorrect;
                optionsContainer.appendChild(div);
            });

            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('submit-btn').style.display = 'block';
            document.getElementById('next-btn').style.display = 'none';
            // BUG修復：確保每次渲染題目時，按鈕文字皆還原為「下一題」
            document.getElementById('next-btn').innerText = '下一題 →'; 
            updateSubmitBtnState();
        }

        function updateSubmitBtnState() {
            const q = currentTestQuestions[currentQuestionIndex];
            const btn = document.getElementById('submit-btn');
            btn.innerText = q.displayAnswer.length > 1 ? '確認送出 (多選題)' : '確認送出';
        }

        function submitAnswer() {
            const q = currentTestQuestions[currentQuestionIndex];
            const selectedElements = Array.from(document.querySelectorAll('.option-label.selected'));
            const selectedVisualKeys = selectedElements.map(el => el.dataset.visualKey).sort();
            
            if (selectedVisualKeys.length === 0) { alert('請至少選擇一個答案！'); return; }

            userAnswers[currentQuestionIndex] = selectedVisualKeys;
            const isCorrect = JSON.stringify(selectedVisualKeys) === JSON.stringify(q.displayAnswer.sort());

            document.querySelectorAll('.option-label').forEach(el => {
                const isOptCorrect = el.dataset.isCorrect === 'true';
                const isSelected = el.classList.contains('selected');
                el.onclick = null; el.style.cursor = 'default'; 
                if (isOptCorrect) el.classList.add('correct-ans');
                else if (isSelected && !isOptCorrect) el.classList.add('wrong-ans');
            });

            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.style.display = 'block';
            if (isCorrect) {
                feedbackBox.style.backgroundColor = 'var(--success-bg)';
                feedbackBox.style.borderColor = 'var(--success-border)';
                feedbackBox.style.color = 'var(--success-border)';
                feedbackBox.innerHTML = '✓ 答對了！';
            } else {
                feedbackBox.style.backgroundColor = 'var(--danger-bg)';
                feedbackBox.style.borderColor = 'var(--danger-border)';
                feedbackBox.style.color = 'var(--danger-border)';
                feedbackBox.innerHTML = '✗ 答錯了！正確答案是：' + q.displayAnswer.join(', ');
                addToWrongQuestions(q);
            }

            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            if (currentQuestionIndex === currentTestQuestions.length - 1) document.getElementById('next-btn').innerText = '查看成績 ★';
        }

        function nextQuestion() {
            if (currentQuestionIndex < currentTestQuestions.length - 1) { currentQuestionIndex++; renderQuestion(); } 
            else showResults();
        }

        function promptEndQuiz() { document.getElementById('end-modal').classList.add('active'); }
        function closeModal() { document.getElementById('end-modal').classList.remove('active'); }
        function forceEndQuiz() { closeModal(); currentTestQuestions = currentTestQuestions.slice(0, currentQuestionIndex + (userAnswers[currentQuestionIndex] ? 1 : 0)); showResults(); }

        function showResults() {
            isQuizActive = false; let correctCount = 0; let detailsHTML = '';
            currentTestQuestions.forEach((q, i) => {
                const uAns = userAnswers[i] || [];
                const isCorrect = JSON.stringify(uAns.sort()) === JSON.stringify(q.displayAnswer.sort());
                if (isCorrect) correctCount++;
                detailsHTML += `
                    <div class="detail-item" style="border-color: ${isCorrect ? 'var(--success-border)' : 'var(--danger-border)'};">
                        <h4>Q${i+1}: ${q.question}</h4>
                        <p style="color:var(--text-muted); font-size:0.9rem;">您的答案: ${uAns.join(', ') || '未作答'} | 正確答案: <b>${q.displayAnswer.join(', ')}</b></p>
                    </div>`;
            });

            const total = currentTestQuestions.length;
            document.getElementById('score-percent').innerText = `${total === 0 ? 0 : Math.round((correctCount / total) * 100)}%`;
            document.getElementById('score-fraction').innerText = `${correctCount} / ${total}`;
            document.getElementById('correct-count').innerText = correctCount;
            document.getElementById('wrong-count-display').innerText = total - correctCount;
            document.getElementById('details-container').innerHTML = detailsHTML;
            switchScreen('result-screen');
        }

        function restartQuiz() { goHome(); window.scrollTo(0,0); }
        function addToWrongQuestions(q) {
            if (!wrongQuestions.some(wq => wq.question === q.question)) {
                wrongQuestions.push(q); localStorage.setItem('quizForgeWrongQuestions', JSON.stringify(wrongQuestions)); updateWrongCountUI();
            }
        }
        function updateWrongCountUI() { document.getElementById('header-wrong-count').innerText = wrongQuestions.length; }

        function openFlashcards() { flashcardIndex = 0; switchScreen('flashcard-screen'); renderFlashcard(); }
        
        function renderFlashcard() {
            document.getElementById('fc-inner').classList.remove('flipped');
            if (wrongQuestions.length === 0) {
                document.getElementById('empty-flashcard-msg').style.display = 'block'; document.getElementById('flashcard-content').style.display = 'none'; return;
            }
            document.getElementById('empty-flashcard-msg').style.display = 'none'; document.getElementById('flashcard-content').style.display = 'block';

            const q = wrongQuestions[flashcardIndex];
            document.getElementById('flashcard-progress').innerText = `進度：${flashcardIndex + 1} / ${wrongQuestions.length}`;
            
            let optsText = q.displayOptions.map(o => `<div style="margin-bottom: 8px;"><b>${o.visualKey}.</b> ${o.text}</div>`).join('');
            document.getElementById('fc-q-text').innerHTML = `<h3 style="margin-top:0;">${q.question}</h3><div style="font-size:1rem; text-align:left; display:block; width: 100%;">${optsText}</div>`;
            
            let correctOptsText = q.displayOptions
                .filter(o => o.isCorrect)
                .map(o => `<div style="padding: 12px; border: 1px solid var(--success-border); border-radius: 8px; background: var(--success-bg); color: var(--success-border); text-align: left; margin-top: 10px; font-size: 1rem;"><b>${o.visualKey}.</b> ${o.text}</div>`)
                .join('');
                
            document.getElementById('fc-a-text').innerHTML = `
                <div style="color: var(--text-main); font-size: 1.1rem; text-align: left; margin-bottom: 15px;">${q.question}</div>
                <div style="width: 100%;">${correctOptsText}</div>
            `;
        }
        
        function flipCard() { document.getElementById('fc-inner').classList.toggle('flipped'); }
        function nextFlashcard() { if (wrongQuestions.length) { flashcardIndex = (flashcardIndex + 1) % wrongQuestions.length; renderFlashcard(); } }
        function prevFlashcard() { if (wrongQuestions.length) { flashcardIndex = (flashcardIndex - 1 + wrongQuestions.length) % wrongQuestions.length; renderFlashcard(); } }
        
        function markLearned() {
            if (!wrongQuestions.length) return;
            wrongQuestions.splice(flashcardIndex, 1); localStorage.setItem('quizForgeWrongQuestions', JSON.stringify(wrongQuestions)); updateWrongCountUI();
            if (flashcardIndex >= wrongQuestions.length && flashcardIndex > 0) flashcardIndex--;
            renderFlashcard();
        }

        function clearAllFlashcards() {
            if (confirm('確定要清空所有錯題紀錄嗎？此動作無法復原。')) {
                wrongQuestions = [];
                localStorage.removeItem('quizForgeWrongQuestions');
                updateWrongCountUI();
                renderFlashcard();
            }
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            isQuizActive = (screenId === 'quiz-screen');
        }
        function goHome() { switchScreen('home-screen'); }
    </script>
