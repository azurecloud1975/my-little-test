<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智慧考試平台 Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  /* 延用原有的 CSS 樣式並增加以下 */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
  :root { --ink: #1a1a2e; --paper: #f5f0e8; --accent: #c84b31; --accent2: #2d6a4f; --gold: #d4a017; --muted: #7a7068; --border: #d4cec4; --correct: #2d6a4f; --wrong: #c84b31; --card: #faf7f2; --shadow: rgba(26,26,46,0.12); }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; }
  header { background: var(--ink); color: var(--paper); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; }
  .nav-pills { display: flex; gap: 0.5rem; }
  .nav-pill { background: transparent; border: 1px solid rgba(245,240,232,0.2); color: rgba(245,240,232,0.7); padding: 0.4rem 1rem; border-radius: 2rem; cursor: pointer; font-size: 0.82rem; transition: all 0.2s; }
  .nav-pill.active { background: var(--accent); border-color: var(--accent); color: white; }
  main { max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  .page { display: none; }
  .page.active { display: block; }
  .question-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; margin-bottom: 1.5rem; }
  .btn-primary { background: var(--accent); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .btn-nav { background: white; border: 1.5px solid var(--border); padding: 0.6rem 1.2rem; border-radius: 8px; cursor: pointer; }
  
  /* 新增編輯區樣式 */
  .edit-area { width: 100%; height: 300px; font-family: monospace; padding: 10px; margin-bottom: 10px; }
  .control-panel { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .remove-btn { background: #ff4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">📖 智慧考試平台 Pro</div>
  <nav class="nav-pills">
    <button class="nav-pill active" onclick="showPage('upload')">上傳</button>
    <button class="nav-pill" id="nav-exam" onclick="showPage('exam')">作答</button>
    <button class="nav-pill" id="nav-wrong" onclick="showPage('wrong')">錯題本</button>
  </nav>
</header>

<main>
  <div class="page active" id="page-upload">
    <div class="question-card">
      <h3>1. 設定 API Key (Claude-3-5-Haiku)</h3>
      <input type="password" id="api-key" placeholder="sk-ant-..." style="width:100%; padding:8px; margin:10px 0;">
      
      <h3>2. 上傳檔案 (PDF/Word/TXT)</h3>
      <input type="file" id="file-input" accept=".pdf,.docx,.txt" onchange="handleFileUpload(this)">
      
      <div id="preview-section" style="display:none; margin-top:20px;">
        <h3>3. 預覽與修正 JSON</h3>
        <p style="font-size: 12px; color: var(--muted);">AI 分析後您可以手動修改下方的 JSON 內容</p>
        <textarea id="json-editor" class="edit-area"></textarea>
        <button class="btn-primary" onclick="importFromEditor()">確認並開始考試</button>
      </div>
    </div>
    <div id="storage-hint" style="text-align:center; color:var(--muted); font-size:12px;"></div>
  </div>

  <div class="page" id="page-exam">
    <div class="control-panel">
      <button class="btn-nav" onclick="shuffleCurrentQuestions()">🔀 打亂題目與選項</button>
      <button class="btn-nav" onclick="exportToPDF()">📥 匯出 PDF</button>
      <button class="btn-nav" onclick="clearAllData()" style="color:red">🗑️ 清除所有紀錄</button>
    </div>
    <div id="exam-content"></div>
    <div class="question-nav">
      <button class="btn-nav" onclick="prevQ()">上一題</button>
      <button class="btn-nav" onclick="nextQ()">下一題</button>
    </div>
  </div>

  <div class="page" id="page-wrong">
    <h2>❌ 我的錯題本</h2>
    <div id="wrong-list"></div>
  </div>
</main>

<script>
let state = {
  questions: [],
  answers: {},
  wrongAnswers: [], // 儲存題目索引
  currentIdx: 0
};

// ======================== 初始化與儲存 ========================
window.onload = () => {
  const saved = localStorage.getItem('exam_pro_data');
  if (saved) {
    state = JSON.parse(saved);
    document.getElementById('storage-hint').innerText = "已載入上次未完成的進度";
    renderExam();
  }
};

function saveData() {
  localStorage.setItem('exam_pro_data', JSON.stringify(state));
}

function clearAllData() {
  if(confirm("確定要清除所有題目與紀錄嗎？")) {
    localStorage.removeItem('exam_pro_data');
    location.reload();
  }
}

// ======================== 檔案處理 ========================
async function handleFileUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const apiKey = document.getElementById('api-key').value;
  if (!apiKey) return alert("請輸入 API Key");

  let text = "";
  if (file.name.endsWith('.docx')) {
    const arrayBuffer = await file.arrayBuffer();
    const result = await mammoth.extractRawText({arrayBuffer});
    text = result.value;
  } else if (file.name.endsWith('.txt')) {
    text = await file.text();
  } else if (file.name.endsWith('.pdf')) {
    alert("PDF 建議直接貼上文字到下方，或使用原有的 PDF 解析邏輯。");
    return;
  }

  callClaudeAPI(text, apiKey);
}

async function callClaudeAPI(text, apiKey) {
  // 顯示載入狀態...
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-3-5-haiku-20241022',
        max_tokens: 4000,
        system: "將考題轉為JSON: {questions: [{text, options:[], answer:0, explanation}]}",
        messages: [{role: 'user', content: text}]
      })
    });
    const data = await response.json();
    const rawJson = data.content[0].text;
    document.getElementById('json-editor').value = rawJson;
    document.getElementById('preview-section').style.display = 'block';
  } catch (e) {
    alert("API 呼叫失敗: " + e.message);
  }
}

function importFromEditor() {
  try {
    const parsed = JSON.parse(document.getElementById('json-editor').value);
    state.questions = parsed.questions;
    state.answers = {};
    state.wrongAnswers = [];
    state.currentIdx = 0;
    saveData();
    showPage('exam');
    renderExam();
  } catch(e) {
    alert("JSON 格式有誤，請檢查");
  }
}

// ======================== 隨機化 ========================
function shuffleCurrentQuestions() {
  // 打亂題目
  state.questions.sort(() => Math.random() - 0.5);
  // 打亂每題的選項
  state.questions.forEach(q => {
    const correctText = q.options[q.answer];
    q.options.sort(() => Math.random() - 0.5);
    q.answer = q.options.indexOf(correctText);
  });
  state.answers = {}; // 隨機後清空答案避免錯位
  saveData();
  renderExam();
}

// ======================== 考試邏輯 ========================
function renderExam() {
  if (state.questions.length === 0) return;
  const q = state.questions[state.currentIdx];
  const userAns = state.answers[state.currentIdx];
  
  let html = `<div class="question-card">
    <p>第 ${state.currentIdx + 1} 題 / 共 ${state.questions.length} 題</p>
    <h4>${q.text}</h4><br>`;
  
  q.options.forEach((opt, i) => {
    let style = "";
    if (userAns !== undefined) {
      if (i === q.answer) style = "background:#d4edda; border-color:green;";
      else if (i === userAns) style = "background:#f8d7da; border-color:red;";
    }
    html += `<button class="option" onclick="selectAns(${i})" style="width:100%; text-align:left; padding:10px; margin:5px 0; border:1px solid #ccc; border-radius:5px; ${style}" ${userAns !== undefined ? 'disabled' : ''}>${opt}</button>`;
  });

  if (userAns !== undefined) {
    html += `<div style="margin-top:15px; padding:10px; background:#e9ecef; border-radius:5px;">
      <b>解析：</b>${q.explanation || "無提供解析"}
    </div>`;
  }
  
  html += `</div>`;
  document.getElementById('exam-content').innerHTML = html;
}

function selectAns(idx) {
  state.answers[state.currentIdx] = idx;
  if (idx !== state.questions[state.currentIdx].answer) {
    if (!state.wrongAnswers.includes(state.currentIdx)) {
      state.wrongAnswers.push(state.currentIdx);
    }
  }
  saveData();
  renderExam();
}

function nextQ() { if(state.currentIdx < state.questions.length - 1) { state.currentIdx++; renderExam(); } }
function prevQ() { if(state.currentIdx > 0) { state.currentIdx--; renderExam(); } }

// ======================== 錯題本 ========================
function renderWrongBook() {
  const container = document.getElementById('wrong-list');
  if (state.wrongAnswers.length === 0) {
    container.innerHTML = "目前沒有錯題！";
    return;
  }
  
  let html = "";
  state.wrongAnswers.forEach((qIdx) => {
    const q = state.questions[qIdx];
    html += `<div class="question-card">
      <button class="remove-btn" onclick="removeFromWrong(${qIdx})" style="float:right">從錯題本移除</button>
      <p>題目：${q.text}</p>
      <p style="color:green">正確答案：${q.options[q.answer]}</p>
    </div>`;
  });
  container.innerHTML = html;
}

function removeFromWrong(qIdx) {
  state.wrongAnswers = state.wrongAnswers.filter(id => id !== qIdx);
  saveData();
  renderWrongBook();
}

// ======================== 輔助功能 ========================
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (id === 'wrong') renderWrongBook();
}

function exportToPDF() {
  const element = document.getElementById('exam-content');
  html2pdf().from(element).save('my_quiz.pdf');
}
</script>
</body>
</html>
